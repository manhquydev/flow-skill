name: Nightly registry health check

# Fires nightly against the live npm registry. Catches:
#   - a published version disappearing (revoked, unpublished, or npm outage)
#   - install semantics regressing (a bad version silently on latest)
#   - provenance dropping off the attestation index
# Runs on cron + on-demand; needs no secrets — uses public npm APIs only.

on:
  schedule:
    - cron: '17 4 * * *'   # 04:17 UTC = 11:17 ICT — off-peak to reduce noise if it fails
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to smoke against (blank = latest published)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: nightly-registry-health
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve target versions (rc + latest, deduped)
        id: version
        run: |
          # Smoke both `rc` and `latest` when they diverge so a stable regression cannot
          # slip through undetected. Dedupe when they point at the same version. Single
          # explicit input override still wins if the operator specifies one.
          if [ -n "${{ inputs.version }}" ]; then
            versions="${{ inputs.version }}"
          else
            rc="$(npm view @manhquy/flow-skill dist-tags.rc 2>/dev/null)"
            latest="$(npm view @manhquy/flow-skill dist-tags.latest 2>/dev/null)"
            versions=""
            [ -n "$rc" ] && [ "$rc" != "undefined" ] && versions="$rc"
            if [ -n "$latest" ] && [ "$latest" != "undefined" ] && [ "$latest" != "$rc" ]; then
              versions="${versions:+$versions }$latest"
            fi
          fi
          if [ -z "$versions" ]; then
            echo "No published versions found — skipping." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "resolved: $versions"
            echo "versions=$versions" >> "$GITHUB_OUTPUT"
          fi

      # No `npm ci` in npm-wrapper: smoke only needs the checked-out scripts/smoke.mjs +
      # network access to the registry. Installing the local package first made npx resolve
      # the workspace package (same name as the published one) and false-failed every night
      # with `flow-skill: not found` even when the registry package was healthy. smoke.mjs
      # itself also forces an empty temp cwd for all npx calls (belt + suspenders).

      - name: Run scripts/smoke.mjs against every resolved version
        if: steps.version.outputs.skip != 'true'
        run: |
          # Run from $RUNNER_TEMP (not npm-wrapper/) so ancestor package.json cannot shadow.
          cd "$RUNNER_TEMP"
          for v in ${{ steps.version.outputs.versions }} ; do
            echo "--- smoke $v ---"
            node "${{ github.workspace }}/npm-wrapper/scripts/smoke.mjs" "$v"
          done
